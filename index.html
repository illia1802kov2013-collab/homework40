
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI ефекти</title>

<style>
body {
  font-family: Arial;
  padding: 40px;
  background: #f5f5f5;
}

.no-scroll {
  overflow: hidden;
}


.btn {
  padding: 10px 20px;
  border: none;
  background: teal;
  color: white;
  cursor: pointer;
  border-radius: 5px;

  transition: all 300ms ease;
}

.btn:hover {
  background: pink;
  color: teal;
  transform: scale(1.05);
}


.card {
  width: 200px;
  height: 250px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 40px;

  transition: all 300ms ease;
}

.card:hover {
  transform: scale(1.05) translateY(-5px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}


.gallery {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
}

.gallery-item {
  width: 200px;
  border-radius: 10px;

  transition: all 300ms ease;
}

.gallery-item:hover {
  transform: scale(1.1) rotate(3deg);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.gallery:hover .gallery-item:not(:hover) {
  filter: brightness(0.7);
  transform: scale(0.95);
}


.portfolio-card {
  width: 350px;
  height: 250px;
  background: url("https://picsum.photos/400/300") center/cover;
  position: relative;
  overflow: hidden;
  margin-bottom: 40px;

  transition: transform 300ms ease;
}

.portfolio-card:hover {
  transform: scale(1.03);
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 20px;

  display: flex;
  flex-direction: column;
  justify-content: center;

  transform: translateX(-100%);
  opacity: 0;

  transition: all 400ms ease;
}

.portfolio-card:hover .overlay {
  transform: translateX(0);
  opacity: 1;
}


.backdrop {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.5);

  opacity: 1;
  transition: opacity 300ms ease;
}

.backdrop.is-hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.modal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -100px) scale(0.9);
  width: 300px;
  padding: 20px;
  background: black;
  border-radius: 10px;

  transition: all 300ms ease;
}

.backdrop:not(.is-hidden) .modal {
  transform: translate(-50%, -50%) scale(1);
}

.close {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;

  transition: transform 200ms ease;
}

.close:hover {
  transform: rotate(90deg) scale(1.2);
}
</style>
</head>

<body>

<h2>Картка</h2>
<div class="card">
  <h3>Ім’я</h3>
  <p>Frontend Developer</p>
</div>

<h2> Галерея</h2>
<div class="gallery">
  <img src="https://picsum.photos/200?1" class="gallery-item">
  <img src="https://picsum.photos/200?2" class="gallery-item">
  <img src="https://picsum.photos/200?3" class="gallery-item">
</div>

<h2> модалка</h2>
<div class="portfolio-card">
  <div class="overlay">
    <h3>Проєкт</h3>
    <p>Короткий опис</p>
    <button class="btn" data-modal-open>Переглянути</button>
  </div>
</div>


<div class="backdrop is-hidden" data-modal>
  <div class="modal">
    <span class="close" data-modal-close></span>

    <h3>Назва товару</h3>
    <p>Ціна: 1000 грн</p>
    <p>Опис товару...</p>
    <button class="btn">Додати в кошик</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
